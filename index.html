<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>VesselX • 404 — domain moved</title>
  <!-- Preconnect for faster font loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Google Fonts: bold modern rounded sans (Plus Jakarta Sans) + Inter fallback -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,700;14..32,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (free icons, up-to-date) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: white;
      font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* main container – elegant spacing, clean glassmorphic influence */
    .container {
      max-width: 720px;
      width: 100%;
      margin: 2rem auto;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(0px);
      border-radius: 48px;
      padding: 2rem 2rem 2.5rem;
      transition: all 0.2s ease;
    }

    /* glitchy 404 area — bold black modern glitch style */
    .glitch-wrapper {
      text-align: center;
      margin-bottom: 2.5rem;
      position: relative;
    }

    .glitch {
      font-size: clamp(5rem, 18vw, 11rem);
      font-weight: 900;
      font-family: 'Plus Jakarta Sans', 'Inter', monospace;
      color: black;
      letter-spacing: -0.02em;
      position: relative;
      text-shadow: 0.05em 0 0 rgba(255,0,0,0.4), -0.05em -0.025em 0 rgba(0,255,255,0.4);
      animation: glitch-shake 0.3s infinite alternate;
      line-height: 1;
    }

    /* glitch pseudo-elements for extra distortion */
    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
    }

    .glitch::before {
      left: 2px;
      text-shadow: -2px 0 rgba(255, 0, 0, 0.6);
      animation: glitch-anim-1 0.4s infinite linear alternate-reverse;
    }

    .glitch::after {
      left: -2px;
      text-shadow: 2px 0 rgba(0, 255, 255, 0.6);
      animation: glitch-anim-2 0.35s infinite linear alternate-reverse;
    }

    @keyframes glitch-anim-1 {
      0% { clip-path: polygon(0 2%, 100% 2%, 100% 5%, 0 5%); transform: translateX(-2px);}
      20% { clip-path: polygon(0 15%, 100% 15%, 100% 18%, 0 18%); transform: translateX(1px);}
      40% { clip-path: polygon(0 33%, 100% 33%, 100% 36%, 0 36%); transform: translateX(-1px);}
      60% { clip-path: polygon(0 70%, 100% 70%, 100% 73%, 0 73%); transform: translateX(2px);}
      80% { clip-path: polygon(0 85%, 100% 85%, 100% 88%, 0 88%); transform: translateX(-2px);}
      100% { clip-path: polygon(0 95%, 100% 95%, 100% 98%, 0 98%); transform: translateX(1px);}
    }

    @keyframes glitch-anim-2 {
      0% { clip-path: polygon(0 4%, 100% 4%, 100% 7%, 0 7%); transform: translateX(1px);}
      30% { clip-path: polygon(0 24%, 100% 24%, 100% 27%, 0 27%); transform: translateX(-2px);}
      50% { clip-path: polygon(0 44%, 100% 44%, 100% 47%, 0 47%); transform: translateX(2px);}
      70% { clip-path: polygon(0 62%, 100% 62%, 100% 65%, 0 65%); transform: translateX(-1px);}
      90% { clip-path: polygon(0 82%, 100% 82%, 100% 85%, 0 85%); transform: translateX(1px);}
      100% { clip-path: polygon(0 96%, 100% 96%, 100% 99%, 0 99%); transform: translateX(-1px);}
    }

    @keyframes glitch-shake {
      0% { transform: skew(0deg, 0deg);}
      100% { transform: skew(0.5deg, -0.3deg);}
    }

    /* description / message */
    .message {
      text-align: center;
      margin: 2rem 0 2.2rem;
    }

    .lead {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #1c1c1e;
      margin-bottom: 0.65rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .lead i {
      font-size: 1.5rem;
      color: #000;
      background: #f2f2f5;
      padding: 6px;
      border-radius: 40px;
    }

    .redirect-link {
      font-size: 1.35rem;
      font-weight: 600;
      background: #f5f5f7;
      display: inline-block;
      padding: 0.75rem 1.6rem;
      border-radius: 60px;
      transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
      margin-top: 0.5rem;
      backdrop-filter: blur(2px);
    }

    .redirect-link a {
      text-decoration: none;
      color: #007aff;
      font-weight: 700;
      letter-spacing: -0.2px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .redirect-link a i {
      font-size: 1.25rem;
      color: #007aff;
      transition: transform 0.2s;
    }

    .redirect-link a:hover {
      color: #005fc5;
      text-decoration: underline;
      text-underline-offset: 6px;
    }

    .redirect-link a:hover i {
      transform: translateX(3px);
    }

    .sub-message {
      font-size: 1rem;
      font-weight: 500;
      color: #6c6c70;
      margin-top: 1.2rem;
      border-top: 1px solid #e9e9ef;
      padding-top: 1.4rem;
      display: inline-block;
      width: auto;
    }

    /* footer group — elegant modern cards */
    .footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.2rem;
      margin-top: 2rem;
      padding-top: 0.8rem;
      border-top: 1px solid #e9e9ef;
    }

    .footer-card {
      background: #f8f8fc;
      border-radius: 80px;
      padding: 0.8rem 1.8rem;
      transition: all 0.25s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02), 0 0.5px 0 rgba(0,0,0,0.02);
    }

    .footer-card a {
      text-decoration: none;
      font-weight: 620;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #1c1c1e;
      letter-spacing: -0.2px;
      transition: all 0.2s;
    }

    .footer-card a i {
      font-size: 1.35rem;
      transition: transform 0.2s, color 0.2s;
    }

    /* brand icons colors on hover */
    .footer-card.telegram a i {
      color: #26A5E4;
    }
    .footer-card.whatsapp a i {
      color: #25D366;
    }

    .footer-card:hover {
      background: #ffffff;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02);
      transform: translateY(-2px);
    }

    .footer-card a:hover i {
      transform: scale(1.08);
    }

    /* extra note micro detail */
    .extra-note {
      text-align: center;
      font-size: 0.75rem;
      color: #8e8e93;
      margin-top: 2rem;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    /* responsive */
    @media (max-width: 550px) {
      .container {
        padding: 1.5rem;
      }
      .lead {
        font-size: 1.2rem;
      }
      .redirect-link {
        font-size: 1.1rem;
        padding: 0.6rem 1.2rem;
      }
      .footer-card {
        padding: 0.6rem 1.4rem;
      }
      .glitch {
        letter-spacing: -0.01em;
      }
    }

    /* modern ios-like haptic */
    a, .footer-card {
      cursor: pointer;
      user-select: none;
    }

    /* big bold glitchy style fully black, modern */
    .glitch, .glitch::before, .glitch::after {
      font-weight: 900;
      font-family: 'Plus Jakarta Sans', 'Inter', 'SF Pro Display', system-ui;
    }

    /* fix: ensure no leftover raw CSS text appears anywhere */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
    }
    /* Hide any accidental content that might leak */
    .container, .glitch-wrapper, .message, .footer-links {
      visibility: visible;
      display: block;
    }
  </style>
</head>
<body>
<div class="container">
  <!-- 404 glitch area (big black glitchy style) -->
  <div class="glitch-wrapper">
    <div class="glitch" data-text="404">404</div>
  </div>

  <!-- main content: domain moved message + clickable link -->
  <div class="message">
    <div class="lead">
      <i class="fas fa-compass"></i>
      <span>Looking for VesselX?</span>
    </div>
    <div class="redirect-link">
      <a href="https://VesselX.qzz.io" target="_blank" rel="noopener noreferrer">
        <i class="fas fa-external-link-alt"></i>
        vesselx.qzz.io
        <i class="fas fa-arrow-right"></i>
      </a>
    </div>
    <div class="sub-message">
      <i class="fas fa-sync-alt" style="font-size: 0.85rem; margin-right: 6px;"></i> 
      We changed our domain. 
    </div>
  </div>

  <!-- two footers: Telegram channel + WhatsApp (VesselX Developer) -->
  <div class="footer-links">
    <div class="footer-card telegram">
      <a href="https://t.me/vesselxupdates" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-telegram-plane"></i>
        <span>Telegram Channel</span>
        <i class="fas fa-chevron-right" style="font-size: 0.75rem; opacity: 0.7;"></i>
      </a>
    </div>
    <div class="footer-card whatsapp">
      <a href="https://wa.me/2349012834275" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-whatsapp"></i>
        <span>VesselX Developer</span>
        <i class="fas fa-chevron-right" style="font-size: 0.75rem; opacity: 0.7;"></i>
      </a>
    </div>
  </div>
  <div class="extra-note">
    <i class="fas fa-globe"></i> old domain
  </div>
</div>
</body>
</html>
